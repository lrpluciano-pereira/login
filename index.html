<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ética Aristotélica no Cotidiano Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d1a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 3.5rem;
            background: #b8942e;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .logo h1 {
            color: #d4af37;
            font-size: 1.6rem;
            margin-top: 16px;
        }

        .logo p {
            color: #9aa7b9;
            font-size: 0.85rem;
        }

        .login-card {
            background: #0f1a2f;
            border-radius: 24px;
            padding: 40px 32px;
            border: 1px solid #1e2a44;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .login-card h2 {
            color: #d4af37;
            text-align: center;
            margin-bottom: 28px;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #9aa7b9;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #16213e;
            border: 1px solid #1e2a44;
            border-radius: 12px;
            color: #ffffff;
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: #d4af37;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #d4af37;
            color: #0a1628;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
        }

        .btn-login:hover {
            background: #e6c453;
        }

        .demo-credentials {
            background: rgba(212,175,55,0.1);
            border-radius: 12px;
            padding: 12px;
            margin-top: 20px;
            text-align: center;
            font-size: 0.75rem;
            color: #9aa7b9;
        }

        .demo-credentials span {
            color: #d4af37;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.7rem;
            color: #9aa7b9;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">⚖️</div>
            <h1>Ética Digital</h1>
            <p>Universidade Federal do ABC</p>
        </div>

        <div class="login-card">
            <h2>Acesso ao Curso</h2>
            
            <div class="input-group">
                <label>📧 E-mail ou matrícula</label>
                <input type="text" id="username" placeholder="Digite seu usuário">
            </div>

            <div class="input-group">
                <label>🔒 Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha">
            </div>

            <button class="btn-login" onclick="entrar()">Entrar no Curso</button>

            <div class="demo-credentials">
                💡 <strong>Demonstração:</strong><br>
                Clique em "Entrar" para acessar o curso
            </div>
        </div>

        <div class="footer">
            <p>Especialização em Ciência e Tecnologia | Licença Creative Commons BY-NC-SA</p>
        </div>
    </div>

    <script>
        function entrar() {
            const nome = document.getElementById('username').value;
            if (nome.trim() === '') {
                localStorage.setItem('usuario_nome', 'Estudante');
            } else {
                localStorage.setItem('usuario_nome', nome);
            }
            localStorage.setItem('usuario_logado', 'true');
            
            // ✅ Link sem .html
            window.location.href = '/index/';
        }
    </script>
</body>
</html>
