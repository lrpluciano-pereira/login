<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ética Aristotélica no Cotidiano Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a1628;
            --bg-card: #0f1a2f;
            --bg-light: #16213e;
            --gold: #d4af37;
            --gold-dark: #b8942e;
            --text-primary: #ffffff;
            --text-secondary: #9aa7b9;
            --border: #1e2a44;
            --error: #e74c3c;
            --success: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0d1a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 3.5rem;
            background: var(--gold-dark);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .logo h1 {
            color: var(--gold);
            font-size: 1.6rem;
            margin-top: 16px;
            font-weight: 600;
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 40px 32px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .login-card h2 {
            color: var(--gold);
            text-align: center;
            margin-bottom: 28px;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 2px rgba(212,175,55,0.2);
        }

        .input-group input::placeholder {
            color: #4a5a7a;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: var(--bg-dark);
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-login:hover {
            background: #e6c453;
            transform: scale(1.02);
        }

        .error-message {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid var(--error);
            border-radius: 12px;
            padding: 12px;
            margin-top: 16px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--error);
        }

        .info-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .demo-credentials {
            background: rgba(212,175,55,0.1);
            border-radius: 12px;
            padding: 12px;
            margin-top: 20px;
            text-align: center;
            font-size: 0.75rem;
        }

        .demo-credentials span {
            color: var(--gold);
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px;
            }
            .logo-icon {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
            .logo h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">⚖️</div>
            <h1>Ética Digital</h1>
            <p>Universidade Federal do ABC</p>
        </div>

        <div class="login-card">
            <h2>Acesso ao Curso</h2>
            
            <div class="input-group">
                <label>📧 E-mail ou matrícula</label>
                <input type="text" id="username" placeholder="exemplo@aluno.ufabc.edu.br" autocomplete="off">
            </div>

            <div class="input-group">
                <label>🔒 Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha">
            </div>

            <button class="btn-login" onclick="fazerLogin()">Entrar no Curso</button>

            <div id="errorMessage" class="error-message" style="display: none;"></div>

            <div class="demo-credentials">
                💡 <strong>Credenciais de demonstração:</strong><br>
                Usuário: <span>aluno</span> | Senha: <span>1234</span>
            </div>

            <div class="info-text">
                Ao acessar, você concorda com os termos de uso<br>
                e política de privacidade do curso.
            </div>
        </div>

        <div class="footer">
            <p>Especialização em Ciência e Tecnologia | Licença Creative Commons BY-NC-SA</p>
        </div>
    </div>

    <script>
        function fazerLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            // Validação simples (simulada)
            if (username === '' || password === '') {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Por favor, preencha usuário e senha.';
                return;
            }
            
            if (password.length < 4) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Senha deve ter no mínimo 4 caracteres.';
                return;
            }
            
            // Para demonstração, qualquer usuário com senha >=4 caracteres entra
            // Em uma versão real, isso seria validado no backend
            
            // Salvar nome do usuário para exibir no dashboard
            localStorage.setItem('usuario_nome', username);
            localStorage.setItem('usuario_logado', 'true');
            
            // Redirecionar para a página "Sobre o Curso"
            window.location.href = 'https://lrpluciano-pereira.github.io/sobre.html';
        }
        
        // Permitir pressionar Enter para logar
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fazerLogin();
            }
        });
    </script>
</body>
</html>
